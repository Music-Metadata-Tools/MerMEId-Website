site_name: MerMEId MeLODy
site_description: Browser-based metadata editor for music-related Linked Open Data
repo_url: https://github.com/Music-Metadata-Tools/MerMEId-MeLODy
repo_name: Music-Metadata-Tools/MerMEId-MeLODy
edit_uri: ""

nav:
  - Home: 
    - MerMEId MeLODy: index.md
    - Contributing: home/contributing.md
    - Contact: home/contact.md
  - User Guide:
    - Getting Started: user_guide/index.md
    - The Interface: user_guide/interface.md
    - Working with Entities: user_guide/entities.md
    - Git Workflow: user_guide/git_workflow.md
    - Troubleshooting: user_guide/troubleshooting.md
  - Data Model:
    - Overview: data_model/index.md
    - Ontologies: data_model/ontologies.md
    - FRBR Hierarchy: data_model/frbr.md
    - Entity Types: data_model/entity_types.md
  - Developer Reference:
    - Overview: developer/index.md
    - Architecture: developer/architecture.md
    - Components: developer/components.md
    - Services: developer/services.md
    - Event Communication: developer/events.md
    - SHACL Shapes: developer/shacl_shapes.md
    - Extending the Editor: developer/extending.md
    - Repository Configuration: developer/repo_config.md
  - Community:
    - Overview: community/index.md
  - Events:
    - Upcoming Events: events/index.md
    - "Archive: Trieste 2025": events/archive/trieste_2025.md
  - Roadmap: roadmap.md
  - Legal notice: impressum/impressum.md

theme:
  name: material
  custom_dir: custom_theme
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
  logo: img/CDMD_Logo_cut.png
  favicon: img/CDMD_Logo_cut.png
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - footnotes
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - attr_list

extra_css:
  - style.css

plugins:
  - search:
      lang: en
